name: CI/CD Pipeline for Movie Recommender
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install test dependencies
        run: pip install pytest pandas pathlib scikit-learn

      - name: Run unit tests
        run: pytest tests

  build:
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      # Pulls your code from GitHub
      - name: Check out the code
        uses: actions/checkout@v4

      # Enables Docker's advanced build system
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Logs into Docker Hub using credentials stored as secrets in GitHub
      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Builds the Docker image and pushes it to Docker Hub
      - name: Build and Push Docker Image
        run: |
          docker build -f Dockerfile \
            -t ${{ secrets.DOCKER_USERNAME }}/deepfake-detection:latest \
            .
          docker push ${{ secrets.DOCKER_USERNAME }}/deepfake-detection:latest